<svg width="1100" height="1280" viewBox="0 0 1100 1280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #343434; }
      .box { fill: #4A4A4A; stroke: #6B6B6B; stroke-width: 1.4; }
      .darkBox { fill: #242424; stroke: #5E5E5E; stroke-width: 1.4; }
      .diamond { fill: #4A4A4A; stroke: #6B6B6B; stroke-width: 1.4; }
      .line { stroke: #9EDCF8; stroke-width: 2.2; }
      .branch { stroke: #7D7D7D; stroke-width: 1.8; }
      .title { fill: #F2F2F2; font: 700 16px Arial, sans-serif; }
      .body { fill: #F2F2F2; font: 600 14px Arial, sans-serif; }
      .small { fill: #E3E3E3; font: 600 12px Arial, sans-serif; }
      .badge { fill: #F2F2F2; font: 600 11px Arial, sans-serif; }
    </style>
  </defs>

  <rect width="1100" height="1280" class="bg"/>

  <rect x="325" y="60" width="450" height="64" class="box"/>
  <text x="550" y="99" text-anchor="middle" class="title">User enters requirement into VeriFlow</text>

  <line x1="550" y1="124" x2="550" y2="196" class="line"/>
  <polygon points="550,202 544,190 556,190" fill="#9EDCF8"/>

  <rect x="350" y="196" width="400" height="78" class="box"/>
  <text x="550" y="230" text-anchor="middle" class="title">Frontend app</text>
  <text x="550" y="256" text-anchor="middle" class="body">Input form | generate tests | run tests | results</text>

  <line x1="550" y1="274" x2="550" y2="346" class="line"/>
  <polygon points="550,352 544,340 556,340" fill="#9EDCF8"/>

  <rect x="285" y="346" width="530" height="86" class="box"/>
  <text x="550" y="382" text-anchor="middle" class="title">AI generation layer</text>
  <text x="550" y="410" text-anchor="middle" class="body">Turns requirements into a plan, test cases, and Playwright code</text>

  <line x1="550" y1="432" x2="550" y2="510" class="line"/>
  <polygon points="550,516 544,504 556,504" fill="#9EDCF8"/>

  <polygon points="550,510 640,596 550,682 460,596" class="diamond"/>
  <text x="550" y="602" text-anchor="middle" class="title">Known scenario?</text>

  <rect x="130" y="558" width="205" height="66" class="darkBox"/>
  <text x="232" y="586" text-anchor="middle" class="small">Stable demo path</text>
  <text x="232" y="610" text-anchor="middle" class="small">Verified template</text>

  <rect x="765" y="558" width="205" height="66" class="darkBox"/>
  <text x="867" y="586" text-anchor="middle" class="small">Live model path</text>
  <text x="867" y="610" text-anchor="middle" class="small">Claude generation</text>

  <line x1="460" y1="596" x2="335" y2="591" class="branch"/>
  <line x1="640" y1="596" x2="765" y2="591" class="branch"/>

  <rect x="500" y="722" width="100" height="30" class="darkBox"/>
  <text x="550" y="742" text-anchor="middle" class="badge">shared spec</text>

  <line x1="550" y1="682" x2="550" y2="722" class="line"/>
  <polygon points="550,728 544,716 556,716" fill="#9EDCF8"/>

  <line x1="232" y1="624" x2="232" y2="737" class="branch"/>
  <line x1="232" y1="737" x2="500" y2="737" class="branch"/>
  <line x1="867" y1="624" x2="867" y2="737" class="branch"/>
  <line x1="867" y1="737" x2="600" y2="737" class="branch"/>

  <line x1="550" y1="752" x2="550" y2="824" class="line"/>
  <polygon points="550,830 544,818 556,818" fill="#9EDCF8"/>

  <rect x="325" y="824" width="450" height="78" class="box"/>
  <text x="550" y="858" text-anchor="middle" class="title">Playwright execution</text>
  <text x="550" y="884" text-anchor="middle" class="body">Runs browser tests against the target site</text>

  <line x1="550" y1="902" x2="550" y2="974" class="line"/>
  <polygon points="550,980 544,968 556,968" fill="#9EDCF8"/>

  <rect x="285" y="974" width="530" height="86" class="box"/>
  <text x="550" y="1010" text-anchor="middle" class="title">Reporting layer</text>
  <text x="550" y="1038" text-anchor="middle" class="body">Execution results | AI summary | run history | schedule state</text>

  <rect x="70" y="1105" width="220" height="66" class="box"/>
  <text x="180" y="1144" text-anchor="middle" class="title">Azure DevOps import</text>

  <rect x="440" y="1105" width="220" height="66" class="box"/>
  <text x="550" y="1144" text-anchor="middle" class="title">Playwright spec tab</text>

  <rect x="810" y="1105" width="220" height="66" class="box"/>
  <text x="920" y="1144" text-anchor="middle" class="title">Run history + schedule</text>

  <line x1="550" y1="1060" x2="550" y2="1092" class="branch"/>
  <line x1="550" y1="1092" x2="180" y2="1092" class="branch"/>
  <line x1="550" y1="1092" x2="920" y2="1092" class="branch"/>
  <line x1="180" y1="1092" x2="180" y2="1105" class="branch"/>
  <line x1="920" y1="1092" x2="920" y2="1105" class="branch"/>
</svg>
